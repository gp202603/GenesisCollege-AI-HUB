const PF="'Playfair Display',Georgia,serif",DS="'DM Sans',sans-serif",DM="'DM Mono',monospace";

const lorieFields=[
{key:"L",label:"Learning Goal",color:NAVY,prompt:"What am I trying to understand or learn?",tip:"Focus on understanding, not output. Not 'I need an essay' but 'I want to understand how X affects Y.'"},
{key:"O",label:"Output",color:"#2E75B6",prompt:"What specific output do I need from this interaction?",tip:"Be precise: a list of 3 case studies, an outline with 4 sections, feedback on paragraph 2 of my draft."},
{key:"R",label:"Role / Perspective",color:TEAL,prompt:"From what perspective should the AI respond?",tip:"Assigning a role shapes depth and tone: 'Respond as a political economist' vs 'Respond as a peer reviewer.'"},
{key:"I",label:"Input",color:AMBER,prompt:"What do I already have? My notes, thinking, sources?",tip:"Always include YOUR work. AI should build on your thinking, not replace it. Paste your notes, draft, or ideas."},
{key:"E",label:"Evaluate",color:"#8B4587",prompt:"How will I judge if the response is good enough?",tip:"Define success before you prompt: 'A good response includes specific data, not just general claims.'"}
];

const lorieExamples=[
{subject:"Language B Spanish",task:"Preparing for Individual Oral",icon:"\u{1F5E3}",group:"Languages",L:"I want to understand how urban migration in Colombia connects to the theme of 'Social organisation.'",O:"Give me three discussion points I could develop, each linked to a specific aspect of my selected visual stimulus.",R:"Respond as a cultural studies expert familiar with Colombian urbanisation patterns.",I:"I've selected a photograph of a Bogot\u00E1 neighbourhood showing informal housing. My initial idea is that rapid urbanisation creates inequality, but I think that's too broad.",E:"Good discussion points should be specific to Colombia, culturally grounded, and allow me to demonstrate range of vocabulary related to social issues.",assembled:"I'm studying DP Spanish B and preparing for my Individual Oral on the theme of 'Social organisation.' I want to understand how urban migration in Colombia connects to this theme.\n\nI've selected a photograph of a Bogot\u00E1 neighbourhood showing informal housing. My initial idea is that rapid urbanisation creates inequality, but I think that's too broad.\n\nAs a cultural studies expert familiar with Colombian urbanisation patterns, give me three discussion points I could develop, each linked to a specific aspect of this visual stimulus.\n\nGood discussion points should be specific to Colombia, culturally grounded, and allow me to demonstrate range of vocabulary related to social issues."},
{subject:"Language B French",task:"Vocabulary Building for Theme",icon:"\u{1F1EB}\u{1F1F7}",group:"Languages",L:"I want to expand my vocabulary for discussing environmental issues in French, specifically around 'Sharing the planet.'",O:"Give me 15 topic-specific French phrases related to climate activism and youth engagement, with an example sentence for each.",R:"Respond as a native French speaker who follows current French-language media on environmental topics.",I:"I already know basic terms like 'le r\u00E9chauffement climatique', 'les \u00E9missions de CO\u2082', and 'le d\u00E9veloppement durable'. I need more nuanced, current expressions.",E:"Good phrases should sound natural (not textbook), be appropriate for B HL level, and include at least some informal/colloquial expressions alongside formal ones.",assembled:"I'm a DP French B HL student and I want to expand my vocabulary for discussing environmental issues, specifically around the theme 'Sharing the planet.'\n\nI already know basic terms like 'le r\u00E9chauffement climatique', 'les \u00E9missions de CO\u2082', and 'le d\u00E9veloppement durable'. I need more nuanced, current expressions.\n\nAs a native French speaker who follows current French-language media on environmental topics, give me 15 topic-specific French phrases related to climate activism and youth engagement, with an example sentence for each.\n\nGood phrases should sound natural (not textbook), be appropriate for B HL level, and include at least some informal/colloquial expressions alongside formal ones."},
{subject:"German ab initio",task:"Writing a Blog Post",icon:"\u{1F1E9}\u{1F1EA}",group:"Languages",L:"I want to understand how to structure a blog post in German about healthy eating for the 'Well-being' theme.",O:"Give me a checklist of 6 features a German-language blog post should have at ab initio level, with one German example phrase for each.",R:"Respond as a DP German ab initio teacher who focuses on text-type conventions.",I:"I can write simple sentences about food (Ich esse gern Obst, Gem\u00FCse ist gesund). I know connectives: und, aber, weil. My teacher says my writing sounds like a list of sentences rather than a blog.",E:"Features should be specific to the blog text type. Example phrases should use only ab initio level grammar and vocabulary.",assembled:"I'm a DP German ab initio student and I want to understand how to structure a blog post about healthy eating.\n\nI can write simple sentences (Ich esse gern Obst, Gem\u00FCse ist gesund). I know connectives: und, aber, weil. My teacher says my writing sounds like a list rather than a blog.\n\nAs a DP German ab initio teacher, give me a checklist of 6 features a blog post should have at ab initio level, with one German example phrase for each.\n\nFeatures should be specific to the blog text type. Example phrases should use only ab initio level grammar and vocabulary."},
{subject:"Biology HL",task:"Evaluating Experimental Design",icon:"\u{1F52C}",group:"Sciences",L:"I want to understand the limitations of my experimental design for measuring enzyme activity at different temperatures.",O:"Identify three potential weaknesses in my method and suggest how each could be controlled.",R:"Act as a DP Biology examiner reviewing a student's investigation.",I:"My method: catalase from potato extract, O\u2082 production via water displacement, tested at 20-60\u00B0C in 10\u00B0C intervals, measured every 30 seconds for 5 minutes, 3 trials per temperature.",E:"Good feedback should reference specific steps in my procedure and explain why each weakness affects reliability or validity.",assembled:"I'm a DP Biology HL student investigating enzyme activity at different temperatures.\n\nMy method: catalase from potato extract, O\u2082 production via water displacement, tested at 20-60\u00B0C in 10\u00B0C intervals, measured every 30 seconds for 5 minutes, 3 trials per temperature.\n\nAs a DP Biology examiner, identify three potential weaknesses in my method and suggest how each could be controlled.\n\nFeedback should reference specific steps and explain why each weakness affects reliability or validity."},
{subject:"Physics HL",task:"Connecting Theory to IA Data",icon:"\u269B",group:"Sciences",L:"I want to understand why my double-slit experiment data doesn't match the theoretical intensity pattern.",O:"Suggest three specific physical reasons my data might deviate from theory, and explain what each deviation would look like in my graph.",R:"Respond as a university physics lab demonstrator who helps students troubleshoot optics experiments.",I:"Red laser (650nm), double slit (0.25mm separation, 0.08mm slit width), screen 1.5m away, intensity measured with light sensor. Central maximum is bright but secondary maxima are much dimmer than predicted.",E:"Responses should distinguish between systematic errors and genuine physical effects, and help me decide which factor is most significant for my IA.",assembled:"I'm a DP Physics HL student investigating the double-slit experiment. My central maximum is bright but secondary maxima are much dimmer than predicted.\n\nSetup: Red laser (650nm), double slit (0.25mm separation, 0.08mm slit width), screen 1.5m away, intensity measured with light sensor.\n\nAs a physics lab demonstrator, suggest three physical reasons my data deviates from theory, and what each deviation looks like in my graph.\n\nDistinguish between systematic errors and genuine physical effects. Help me decide which is most significant for my IA."},
{subject:"Chemistry SL",task:"Understanding a Mechanism",icon:"\u2697",group:"Sciences",L:"I want to understand why SN1 reactions produce racemic mixtures while SN2 reactions produce inverted products.",O:"Explain the mechanism step by step, focusing on geometry at each stage. Explain WHY the geometry matters.",R:"Respond as a university organic chemistry tutor explaining to a strong IB student.",I:"I understand SN1 has a carbocation intermediate and SN2 is concerted. I can draw both mechanisms. But I don't understand why the planar carbocation leads to a 50/50 mix.",E:"Use spatial reasoning, reference sp2 vs sp3 geometry, and help me visualise why attack from either side is equally probable.",assembled:"I'm studying DP Chemistry and want to understand why SN1 produces racemic mixtures while SN2 produces inverted products.\n\nI know SN1 has a carbocation intermediate and SN2 is concerted. I can draw both. But I don't get why the planar carbocation leads to 50/50.\n\nAs an organic chemistry tutor, explain step by step, focusing on geometry. Explain WHY geometry matters.\n\nUse spatial reasoning, reference sp2 vs sp3 carbon, help me visualise equal probability of attack from either side."},
{subject:"ESS",task:"Evaluating Environmental Metrics",icon:"\u{1F33F}",group:"Sciences",L:"I want to understand the strengths and limitations of ecological footprint compared to alternative sustainability metrics.",O:"Compare ecological footprint with two alternatives. For each, give one strength and one significant blind spot.",R:"Respond as an environmental systems researcher critical of oversimplified metrics but who understands their communicative value.",I:"I understand how ecological footprint is calculated (biocapacity, global hectares). I got 3.2 planets on the calculator. My teacher said it doesn't account for biodiversity loss.",E:"Name specific real metrics, explain what each measures that others miss, and help me understand why no single metric captures 'sustainability.'",assembled:"I'm a DP ESS student studying ecological footprint. I understand the calculation but my teacher said it misses biodiversity loss.\n\nAs an environmental researcher, compare ecological footprint with two alternative metrics. For each, one strength and one blind spot.\n\nName specific real metrics. Explain what each measures that others miss. Help me understand why no single metric captures sustainability."},
{subject:"Mathematics HL",task:"IA Exploration Refinement",icon:"\u{1F4D0}",group:"Mathematics",L:"I want to understand whether my IA topic has enough mathematical depth for HL.",O:"Evaluate my topic and suggest two extensions that increase sophistication without making it unmanageable.",R:"Respond as a DP Mathematics HL teacher who has moderated many explorations.",I:"My topic: modelling population growth using differential equations. I've done exponential and logistic models. I can do separation of variables. Wondering about Euler's method.",E:"Be specific about which HL syllabus topics connect. Distinguish between 'impressive-looking' and 'mathematically meaningful' extensions.",assembled:"I'm working on my DP Maths HL Exploration on population growth modelling with differential equations. Done exponential and logistic models, can do separation of variables.\n\nAs an experienced HL teacher, evaluate my topic and suggest two extensions that increase depth without becoming unmanageable.\n\nBe specific about syllabus connections. Distinguish between impressive-looking and mathematically meaningful extensions."},
{subject:"TOK",task:"Developing a Knowledge Question",icon:"\u{1F914}",group:"TOK",L:"I want to understand how different Ways of Knowing lead to different conclusions about the same historical event.",O:"Don't give me a knowledge question. Give me three different WOKs for the Fall of the Berlin Wall, with one example of how each leads to a different interpretation.",R:"Respond as a TOK examiner who values conceptual depth over breadth.",I:"I've been thinking about reason and emotion as WOKs, but everyone picks those. I want something less obvious.",E:"Suggestions should be genuinely distinct WOKs and each should lead to a demonstrably different interpretation.",assembled:"I'm developing TOK thinking about how different WOKs lead to different conclusions about the same event.\n\nI've considered reason and emotion but want something less obvious.\n\nAs a TOK examiner valuing depth, give me three WOKs for the Fall of the Berlin Wall, each leading to a different interpretation.\n\nWOKs should be genuinely distinct, each leading to demonstrably different interpretations."},
{subject:"TOK",task:"Exhibition Object Analysis",icon:"\u{1F50E}",group:"TOK",L:"I want to understand how my TOK exhibition object connects to 'What counts as knowledge?' beyond the obvious.",O:"Give me three angles for analysing my object. For each, suggest which AOK is most relevant.",R:"Respond as a philosopher of science familiar with TOK exhibition criteria.",I:"My object is a COVID-19 rapid antigen test. The obvious connection is it 'produces knowledge' about infection. My teacher said go deeper\u2014something about the nature of the knowledge, its reliability, who decides what the result means.",E:"Each angle should be philosophically substantive, connect to specific AOK concepts, and give enough for a full commentary.",assembled:"I'm preparing my TOK Exhibition on 'What counts as knowledge?' with a COVID-19 rapid antigen test.\n\nThe obvious connection is it produces knowledge about infection. My teacher wants me to go deeper.\n\nAs a philosopher of science, give me three analytical angles, each with its most relevant AOK.\n\nAngles should be philosophically substantive, not just descriptive. Avoid angles that lead to a science report rather than TOK analysis."},
{subject:"Global Politics",task:"Engagement Activity Research",icon:"\u{1F30D}",group:"Individuals & Societies",L:"I want to understand how power dynamics between Global North and South shape climate change negotiations.",O:"Compare how two specific countries (one from each) approached COP28, including stated positions and underlying interests.",R:"Respond as an international relations analyst writing for a policy briefing.",I:"I know developing nations argue for climate finance and historical responsibility. I've read about loss and damage funding. But I lack specific country positions from COP28.",E:"Include specific policy positions, name actual negotiators or documents, distinguish public rhetoric from strategic interests.",assembled:"I'm studying DP Global Politics and want to understand North-South power dynamics in climate negotiations.\n\nI know about climate finance arguments and loss and damage. But I lack specific COP28 positions.\n\nAs an IR analyst, compare two countries' COP28 approaches\u2014one Global North, one Global South.\n\nInclude specific positions, name negotiators/documents, distinguish rhetoric from strategic interests."},
{subject:"History HL",task:"Evaluating Historiography",icon:"\u{1F4DC}",group:"Individuals & Societies",L:"I want to understand how different historians interpret the causes of the Chinese Civil War.",O:"Identify three historians with distinct interpretations of why the CCP won in 1949, summarise each in 2-3 sentences, name the school of thought.",R:"Respond as a historiography lecturer teaching a seminar on modern Chinese history.",I:"I've read about Mao's military strategy and KMT corruption. My textbook mentions peasant support and Japanese invasion. But I can't find genuinely different perspectives.",E:"Name real historians with real published works I can find and cite. The three interpretations should be genuinely distinct.",assembled:"I'm a DP History HL student studying the Chinese Civil War. I've read about Mao's strategy and KMT corruption but can't find distinct historiographical perspectives.\n\nAs a historiography lecturer, identify three historians with different interpretations of why the CCP won in 1949.\n\nName real historians with real published works. Interpretations should be genuinely distinct, not just different emphases."},
{subject:"Economics HL",task:"Evaluating Policy Analysis",icon:"\u{1F4CA}",group:"Individuals & Societies",L:"I want to understand whether my minimum wage analysis uses economic theory correctly.",O:"Review my draft and identify: (1) theoretical errors, (2) unstated assumptions, (3) one strong counter-argument.",R:"Respond as a DP Economics HL examiner who values precise terminology and balanced evaluation.",I:"My draft: 'Raising the minimum wage to $15 will cause unemployment because firms face higher costs and will reduce their labour demand. The demand curve for labour shifts left, creating a surplus.'",E:"Point out the specific diagram error, explain why market structure matters, suggest a counter-argument using a different economic model.",assembled:"I'm a DP Economics HL student. Review my minimum wage analysis for theoretical accuracy.\n\nMy draft: 'Raising the minimum wage causes unemployment because firms reduce labour demand. The demand curve shifts left, creating a surplus.'\n\nAs an examiner, identify: (1) theoretical errors, (2) unstated assumptions, (3) one strong counter-argument.\n\nPoint out the diagram error, explain why market structure matters, suggest a counter using a different model."},
{subject:"Psychology SL",task:"Evaluating a Research Study",icon:"\u{1F9E0}",group:"Individuals & Societies",L:"I want to understand the methodological strengths and limitations of Loftus and Palmer (1974).",O:"Give me three strengths and three limitations, each with a one-sentence explanation of WHY it matters.",R:"Respond as a DP Psychology examiner who rewards connecting limitations to validity.",I:"I know the study used different verb conditions ('smashed' vs 'contacted') and measured speed estimates. It's a lab experiment. I wrote 'it lacks ecological validity' but my teacher said that's too vague.",E:"Strengths/limitations should be specific to THIS study, not generic. Each should explain impact on internal or external validity.",assembled:"I'm a DP Psychology SL student evaluating Loftus and Palmer (1974). I know it used verb conditions and measured speed estimates.\n\nI wrote 'lacks ecological validity' but my teacher said too vague.\n\nAs a Psychology examiner, give me three strengths and three limitations, each explaining WHY it matters for the study's conclusions.\n\nBe specific to THIS study. Explain impact on internal or external validity in concrete terms."},
{subject:"Geography SL",task:"Finding Specific Case Studies",icon:"\u{1F5FA}",group:"Individuals & Societies",L:"I want specific examples of globalisation affecting cultural practices in a named Southeast Asian community.",O:"Three examples from ONE named community: what changed, what was preserved, what tension exists.",R:"Respond as a cultural geographer sceptical of both 'globalisation destroys culture' and 'globalisation enriches culture.'",I:"I understand cultural diffusion, glocalisation, cultural imperialism. But all my examples are generic (McDonald's, Hollywood). I need nuance.",E:"Name a real community and real practices. Show complexity. I should be able to verify through independent research.",assembled:"I'm a DP Geography SL student studying globalisation and cultural change. My examples are too generic.\n\nAs a cultural geographer, give me three examples from ONE named Southeast Asian community: what changed, preserved, and what tension exists.\n\nName real practices. Show complexity, not just 'good' or 'bad.' I should be able to verify independently."},
{subject:"English A Lit",task:"Exploring Authorial Choices",icon:"\u{1F4DA}",group:"English A",L:"I want to understand how Atwood uses narrative structure in The Handmaid's Tale to create unreliability.",O:"Identify three structural techniques that contribute to narrative unreliability, with a page reference range for each.",R:"Respond as a literary critic specialising in narrative theory and feminist literature.",I:"I've noticed the fragmented timeline and the epilogue. I think night sections vs other sections create different reliability levels, but I can't articulate this.",E:"Name specific literary terms, connect technique to reader effect, go beyond surface-level observations.",assembled:"I'm studying The Handmaid's Tale and want to understand how Atwood creates narrative unreliability through structure.\n\nI've noticed the fragmented timeline and epilogue. Night sections seem different but I can't articulate why.\n\nAs a literary critic, identify three structural techniques contributing to unreliability with page ranges.\n\nUse specific literary terms. Connect technique to reader effect. Go beyond study-guide observations."},
{subject:"English A Lang & Lit",task:"Analysing Rhetoric",icon:"\u{1F4F0}",group:"English A",L:"I want to understand how a political speech uses rhetorical strategies to construct an audience.",O:"Identify four rhetorical strategies but DON'T analyse them\u2014give me a guiding question for each instead.",R:"Respond as a rhetoric professor who believes students learn best by discovering techniques themselves.",I:"I'm analysing Obama's 2004 DNC speech. I see anaphora and anecdotes. But there's more with how he constructs 'us' vs 'them.'",E:"Questions should point toward real techniques but be open enough that I do the analytical work. Each targets a different rhetorical layer.",assembled:"I'm analysing Obama's 2004 DNC speech for rhetorical strategies that construct an audience.\n\nI see anaphora and anecdotes but know there's more going on with 'us' vs 'them.'\n\nAs a rhetoric professor, identify four strategies but DON'T analyse them\u2014give guiding questions instead.\n\nQuestions should point toward real techniques but require me to do the analysis. Each targets a different layer."},
{subject:"Extended Essay",task:"Refining a Research Question",icon:"\u{1F4DD}",group:"Extended Essay",L:"I want to understand whether my EE research question is focused enough for genuine argument.",O:"Three alternative versions, each more focused than the last, with one sentence explaining what each gains.",R:"Respond as an EE supervisor who prioritises analytical depth over breadth.",I:"My RQ: 'To what extent did social media influence the Arab Spring?' I know it's too broad. Interested in Egypt, maybe Twitter.",E:"Alternatives should be answerable in 4,000 words, require argumentation not description, each noticeably more specific.",assembled:"My EE RQ: 'To what extent did social media influence the Arab Spring?' I know it's too broad. Interested in Egypt/Twitter.\n\nAs an EE supervisor, give me three alternatives, each more focused, with one sentence explaining what each gains.\n\nMust be answerable in 4,000 words, require argumentation, each noticeably more specific than the last."},
{subject:"CAS",task:"Developing a Service Project",icon:"\u{1F4AA}",group:"CAS",L:"I want to understand whether my CAS project genuinely addresses a community need.",O:"Ask me five critical questions to determine if it's meaningful and sustainable\u2014don't answer them.",R:"Respond as a CAS coordinator who spots the difference between genuine service and performative volunteerism.",I:"My idea: monthly beach cleanup with environment club for 6 months. Coastal city with visible plastic pollution. Haven't contacted local organisations.",E:"Questions should challenge assumptions, address sustainability, community voice, and genuine impact. At least one should be uncomfortable.",assembled:"I'm planning a CAS service project: monthly beach cleanups for 6 months. Coastal city, visible pollution. No local contacts yet.\n\nAs a CAS coordinator, ask me five critical questions about whether this is meaningful and sustainable. Don't answer them.\n\nChallenge my assumptions. Address sustainability, community voice, impact. At least one should be productively uncomfortable."},
{subject:"Visual Arts",task:"Comparative Study",icon:"\u{1F3A8}",group:"The Arts",L:"I want to understand how Kahlo and Bacon both use the body to express psychological states.",O:"Three formal or conceptual connections, with one named artwork from each artist per connection.",R:"Respond as a curator specialising in exhibitions about the body in art.",I:"I've chosen Kahlo's 'The Broken Column' and Bacon's 'Three Studies for Figures at the Base of a Crucifixion.' My analysis keeps saying 'both show pain'\u2014not enough.",E:"Go beyond 'both show suffering.' Identify specific formal strategies and connect them to meaning.",assembled:"I'm comparing Kahlo and Bacon for my Comparative Study. My analysis of 'The Broken Column' and Bacon's 'Three Studies' keeps saying 'both show pain.'\n\nAs a curator, give me three formal/conceptual connections with one artwork from each artist per connection.\n\nGo beyond 'both show suffering.' Identify specific formal strategies (space, colour, composition) and connect to meaning."},
{subject:"Music",task:"Composition Techniques",icon:"\u{1F3B5}",group:"The Arts",L:"I want to understand how minimalist composers create development despite limited material.",O:"Three techniques for creating forward momentum, with one named piece and approximate timestamp for each.",R:"Respond as a composition lecturer who performs minimalist works.",I:"I've listened to Reich's 'Music for 18 Musicians' and Glass's 'Einstein on the Beach.' I understand phasing and arpeggiated patterns. But my own minimalist piece sounds static.",E:"Techniques should be specific enough to try in my own composition. Explain the mechanism, not just the effect.",assembled:"I'm a DP Music student. I understand Reich's phasing and Glass's patterns but my own minimalist piece sounds static.\n\nAs a composition lecturer, explain three techniques for creating momentum, with a named piece and timestamp for each.\n\nTechniques should be specific enough to try myself. Explain the mechanism, not just the effect."},
{subject:"MYP English",task:"Analysing Setting (Criterion A)",icon:"\u{1F4D6}",group:"MYP",L:"I want to understand how the author uses setting to develop the theme of isolation.",O:"Don't analyse it. Give me three guiding questions about setting for my Criterion A paragraph.",R:"Respond as an MYP English teacher coaching a Year 10 student from retelling to analysis.",I:"The story is set in a remote farmhouse during winter. Snow and silence are mentioned a lot. My analysis: 'the setting is isolated which shows the character is lonely.' Teacher wrote 'go deeper\u2014HOW?'",E:"Questions should focus on specific authorial choices (word choice, imagery, sensory detail), leading to analysis not summary.",assembled:"I'm an MYP Year 10 student analysing a short story set in a remote winter farmhouse. My analysis is too surface-level.\n\nAs an MYP English teacher, give me three guiding questions about setting for Criterion A. Don't analyse it for me.\n\nQuestions should focus on authorial choices\u2014word choice, imagery, sensory detail\u2014leading to analysis, not summary."},
{subject:"MYP Sciences",task:"Designing a Fair Test (Crit B/C)",icon:"\u{1F9EA}",group:"MYP",L:"I want to understand whether my experimental design is a fair test.",O:"Identify: (1) my variables, (2) three controlled variables I missed, (3) one improvement for reliability.",R:"Respond as an MYP Science teacher helping a Year 9 student.",I:"My investigation: Does light colour affect plant growth? 4 plants under different coloured cellophane, measure height after 2 weeks. Same plant type and water amount.",E:"Be specific to MY experiment. Controlled variables should be realistic for a school lab. Explain WHY the improvement helps.",assembled:"I'm an MYP Year 9 student. Does light colour affect plant growth? 4 plants under coloured cellophane, same type and water.\n\nAs an MYP Science teacher, identify my variables, three controlled variables I missed, and one reliability improvement.\n\nBe specific to my experiment. Controlled variables should be realistic for school. Explain WHY."},
{subject:"MYP Mathematics",task:"Real-World Patterns (Criterion D)",icon:"\u{1F522}",group:"MYP",L:"I want to connect my triangular number pattern to a real-world situation for Criterion D.",O:"Two real-world contexts, explaining what variables represent and one limitation for each.",R:"Respond as an MYP Maths teacher who values genuine real-life connections.",I:"I found triangular numbers (1,3,6,10,15...) with formula n(n+1)/2. I wrote 'handshakes at a party' but teacher said go further and discuss limitations.",E:"Contexts should be genuinely useful, not textbook clich\u00E9s. Limitations should be specific and mathematical.",assembled:"I'm an MYP student studying triangular numbers with formula n(n+1)/2. 'Handshakes at a party' wasn't enough.\n\nAs an MYP Maths teacher, suggest two real-world contexts with what variables represent and one limitation each.\n\nContexts should be genuinely useful. Limitations should be specific and mathematical."},
{subject:"MYP Individuals & Societies",task:"Source Evaluation (Criterion C)",icon:"\u{1F3DB}",group:"MYP",L:"I want to evaluate a primary source for bias and reliability using OPVL.",O:"Four specific questions to evaluate origin, purpose, value, limitations. Don't answer them.",R:"Respond as an MYP Humanities teacher coaching Year 10 on Criterion C.",I:"My source: letter from a British colonial administrator in India, 1857, calling the Sepoy Rebellion a 'mutiny' and rebels 'ungrateful.' I know it's biased but can only say 'he's British so he's biased.'",E:"Push beyond surface-level bias detection. Each question targets a different evaluation dimension.",assembled:"I'm evaluating a letter from a British administrator in India (1857) calling the Sepoy Rebellion a 'mutiny.' I can only say 'he's British so biased.'\n\nAs an MYP teacher, give me four OPVL questions. Don't answer them.\n\nPush beyond surface-level bias. Each question should target a different dimension of evaluation."},
{subject:"MYP Design",task:"Design Brief (Criterion A)",icon:"\u{1F4A1}",group:"MYP",L:"I want to know if my sustainable packaging design brief is specific enough.",O:"Tell me: (1) what's strong, (2) what's too vague, (3) three research questions to make it more specific.",R:"Respond as an MYP Design teacher who knows strong vs weak Criterion A submissions.",I:"My brief: 'Design sustainable packaging for school lunches because plastic is bad. Client: school canteen. Must keep food fresh and be biodegradable.' Teacher said too general.",E:"Reference Criterion A expectations. Research questions should narrow from general to specific. Don't redesign it for me.",assembled:"My MYP Design brief: 'Sustainable packaging for school lunches, must be fresh and biodegradable.' Teacher said too general.\n\nAs a Design teacher, tell me what's strong, what's vague, and give three research questions to narrow it.\n\nReference Criterion A expectations. Don't redesign for me\u2014help me see what's missing."},
{subject:"MYP Arts (Visual)",task:"Artist Statement (Criterion D)",icon:"\u{1F58C}",group:"MYP",L:"I want to move from describing my process to reflecting on artistic choices.",O:"Three sentence starters moving from description to reflection, with what makes each effective.",R:"Respond as an MYP Visual Arts teacher coaching Criterion D reflective writing.",I:"Mixed-media identity portrait influenced by Kahlo's symbolism and Basquiat's mark-making. My statement: 'I used bright colours like Kahlo and messy lines like Basquiat.' Teacher said it's description, not reflection.",E:"Starters should lead to genuine reflection, connecting decisions to meaning and intention, not just technique.",assembled:"My MYP Visual Arts statement says 'I used bright colours like Kahlo and messy lines like Basquiat.' Teacher says it's description.\n\nAs a Visual Arts teacher, give me three sentence starters moving from description to reflection, explaining why each works.\n\nStarters should connect artistic decisions to meaning and intention, not just technique."},

const charter=[
{n:1,t:"AI is a thinking partner, not a shortcut",d:"If you can't explain what you learned from an AI interaction, you haven't learned anything."},
{n:2,t:"Think before you prompt",d:"Use LORIE every time. If you can't fill in L and I, you're not ready for AI. Spend 10 minutes independently first."},
{n:3,t:"Never trust AI at face value",d:"AI can be inaccurate, biased, culturally insensitive, and confidently wrong. It fabricates sources. Always verify."},
{n:4,t:"Be transparent about AI use",d:"Always acknowledge when and how you used AI. Describe the tool, prompts, and how output influenced your thinking."},
{n:5,t:"AI cannot write your reflections",d:"Reflections require YOUR thinking about YOUR learning. AI has no access to your experience or growth."},
{n:6,t:"AI cannot generate your research questions",d:"For assessed work (EE, IA, Engagement Activities), the research question must come from your own inquiry."},
{n:7,t:"Your ideas matter more than AI's",d:"When everyone uses AI the same way, everyone produces similar ideas (mechanized convergence). Your original thinking is irreplaceable."},
{n:8,t:"Iterate, don't accept",d:"Never take the first response. Push back, challenge, point out errors. The dialogue IS the learning."},
{n:9,t:"Document your AI process",d:"Keep a Thinking Log: what you asked, what you got, what you changed and why. This is evidence of growth."},
{n:10,t:"Know when to put AI away",d:"Some tasks are better without AI. Handwriting, discussion, struggling with problems, reflecting\u2014these need to be tech-free."},
{n:11,t:"AI output is a starting point, never finished",d:"Anything AI produces must be substantially reworked and verified. If you can't explain every part, it's not your work."},
{n:12,t:"Respect the learning process",d:"Struggle, confusion, and effort ARE the learning. Bypassing difficulty with AI means bypassing development."},
{n:13,t:"Use AI to challenge yourself",d:"Ask for counter-arguments, harder questions, alternative perspectives. Don't just confirm what you already think."},
{n:14,t:"AI doesn't know your context",d:"AI doesn't know your class discussions, teacher's expectations, or personal interests. Only you connect learning to your context."},
{n:15,t:"Different subjects, different rules",d:"Check specific guidance for each subject. What's acceptable in one context may not be in another. When in doubt, ask."},
{n:16,t:"You are responsible for everything you submit",d:"Regardless of AI involvement, YOU are responsible for accuracy, quality, and integrity. 'The AI told me' is never an excuse."}
];

function Journal(){
const[entries,setEntries]=useState([]);
const[form,setForm]=useState({task:"",question:"",knew:"",learned:"",changed:""});
const add=()=>{if(form.task.trim()&&form.question.trim()){setEntries([{...form,date:new Date().toLocaleDateString(),id:Date.now()},...entries]);setForm({task:"",question:"",knew:"",learned:"",changed:""})}};
return <div style={{maxWidth:900,margin:"0 auto",padding:"32px 20px"}}>
<h1 style={{fontFamily:PF,color:NAVY,fontSize:32,marginBottom:8}}>AI Reflection Journal</h1>
<p style={{fontFamily:DS,color:"#666",fontSize:14,marginBottom:24}}>Log every AI interaction. Builds metacognitive habits and evidence of engagement.</p>
<div style={{background:"#fff",borderRadius:14,border:"2px solid "+TEAL+"40",padding:24,marginBottom:24}}>
{[{k:"task",l:"What task?",p:"e.g., Biology IA draft"},{k:"question",l:"What did you ask AI?",p:"Your prompt"},{k:"knew",l:"What did you already know?",p:"Existing knowledge"},{k:"learned",l:"What did you learn?",p:"New insights"},{k:"changed",l:"What did you change and why?",p:"Corrections, adaptations"}].map(f=><div key={f.k} style={{marginBottom:12}}>
<label style={{fontFamily:DS,fontWeight:700,color:NAVY,fontSize:13,display:"block",marginBottom:3}}>{f.l}</label>
<textarea value={form[f.k]} onChange={e=>setForm({...form,[f.k]:e.target.value})} placeholder={f.p} rows={2} style={{width:"100%",border:"1px solid #ddd",borderRadius:8,padding:10,fontFamily:DS,fontSize:13,resize:"vertical",boxSizing:"border-box"}}/>
</div>)}
<div onClick={add} style={{background:TEAL,color:"#fff",padding:"10px 24px",borderRadius:8,fontFamily:DS,fontWeight:700,fontSize:14,cursor:"pointer",display:"inline-block"}}>Save Entry</div>
</div>
{entries.length>0&&<h3 style={{fontFamily:DS,color:NAVY,marginBottom:12}}>Your Entries ({entries.length})</h3>}
{entries.map(e=><div key={e.id} style={{background:"#fff",borderRadius:10,border:"1px solid #e0e0e0",padding:16,marginBottom:10}}>
<div style={{fontFamily:DS,fontSize:11,color:"#999",marginBottom:8}}>{e.date} \u2014 {e.task}</div>
<div style={{fontFamily:DS,fontSize:13,color:DK,lineHeight:1.5}}><strong>Asked:</strong> {e.question}<br/><strong>Knew:</strong> {e.knew}<br/><strong>Learned:</strong> {e.learned}<br/><strong>Changed:</strong> {e.changed}</div>
</div>)}
</div>
}

function TaskEvaluator(){
const categories=[
{name:"Task Design",color:NAVY,icon:"\u{1F4DD}",checks:[
{q:"The task requires students to think independently for at least 10 minutes BEFORE using AI",tip:"Without this, students skip straight to AI and never develop their own ideas. This is the single most important safeguard against mechanized convergence.",pos:"Students develop original thinking that AI then builds on\u2014not replaces.",neg:"Students outsource all thinking to AI. You'll get 25 identical responses."},
{q:"The task cannot be completed with a single AI prompt",tip:"If a student can type one prompt and submit the result, the task is testing AI skills, not learning. Multi-step tasks protect genuine engagement.",pos:"The task requires sustained intellectual effort across multiple steps.",neg:"A single prompt produces a submission-ready response. Redesign urgently."},
{q:"The task has at least one component that must be done without AI",tip:"AI-free components (handwritten reflection, in-class discussion, live presentation) ensure students can demonstrate understanding independently.",pos:"Independent capability is protected. Students can't hide behind AI.",neg:"Every component could be AI-generated. Add an AI-free element."},
{q:"The task produces diverse outputs when different students complete it",tip:"If all outputs look similar, the task likely invites mechanized convergence. Good tasks draw on personal experience, local context, or unique analytical angles.",pos:"Student individuality and original thinking are visible in the outputs.",neg:"Risk of mechanized convergence. Personalise the task with unique contexts."}
]},
{name:"AInquiry Alignment",color:TEAL,icon:"\u{1F9ED}",checks:[
{q:"Students must ITERATE: refine prompts and challenge AI outputs multiple times",tip:"Single prompt-response is not inquiry. Require evidence of at least 2-3 iterations where students push back on or refine AI responses.",pos:"Iterative dialogue develops critical evaluation and deeper understanding.",neg:"Students accept first response uncritically. Require documented iterations."},
{q:"Students must QUESTION: create questions of increasing complexity",tip:"Students should move from basic to complex questions. Their prompt sequence should show intellectual progression, not just repetition.",pos:"Question quality improves through the task, showing intellectual growth.",neg:"Students ask surface-level questions. Model question escalation."},
{q:"Students must DEBUNK: verify AI outputs against credible sources",tip:"Every factual claim from AI must be checked. Students should document what they verified, how, and what they found to be inaccurate.",pos:"Critical evaluation is embedded. Students learn AI is fallible.",neg:"AI output is trusted uncritically. Build in mandatory verification steps."},
{q:"Students must COLLABORATE: discuss AI-generated ideas with peers or teacher",tip:"Human collaboration catches errors and expands perspectives that neither the student nor AI considered. This is where the richest learning happens.",pos:"Multiple human perspectives enrich the final output beyond what AI alone provides.",neg:"Students work in isolation with AI. Add peer review or discussion components."}
]},
{name:"Assessment Integrity",color:"#CC3333",icon:"\u2696",checks:[
{q:"AI is used in the IDEAS phase only (not producing the final OUTCOMES)",tip:"The AIO protocol: AI can help explore ideas and perspectives, but the final product\u2014the essay, analysis, reflection, design\u2014must be the student's own work.",pos:"Student ownership of the final product is clear and defensible.",neg:"AI is producing the assessed output. This is an academic integrity violation."},
{q:"You have checked the subject-specific IB guidance for this assessment type",tip:"Each IB subject has specific rules about AI use in assessments. General school policy is not enough\u2014you must check the subject guide.",pos:"The task complies with IB requirements for this specific assessment type.",neg:"You may be violating IB assessment regulations. Check the subject guide immediately."},
{q:"Students must document all AI interactions (prompts, responses, changes made)",tip:"Transparency is non-negotiable. Students should submit their Thinking Log alongside their work, showing prompts used, responses received, and how they modified outputs.",pos:"Full transparency. Teachers can verify genuine engagement with AI.",neg:"AI use is invisible. You cannot distinguish genuine learning from copy-paste."},
{q:"A student could explain and defend every part of their submission in a conversation",tip:"This is the Ownership Test. If a student cannot talk through their reasoning, justify their choices, and answer follow-up questions, AI has done too much.",pos:"The work genuinely reflects student understanding and thinking.",neg:"Students cannot defend their own work. The assessment has no validity."}
]},
{name:"Learning Design",color:"#8B4587",icon:"\u{1F4A1}",checks:[
{q:"The task develops specific ATL skills (not just produces an output)",tip:"Good tasks build thinking, communication, research, social, or self-management skills. If the task only produces a document, it may not be developing skills.",pos:"Students are developing transferable skills through the AI interaction.",neg:"The task produces an output but doesn't develop skills. Redesign around ATL."},
{q:"The task connects to the IB Learner Profile attributes",tip:"Consider which attributes the task develops: inquirer, thinker, communicator, principled, reflective? AI tasks should strengthen these, not bypass them.",pos:"The task strengthens learner profile attributes through structured AI use.",neg:"AI use may be undermining key attributes, especially 'thinker' and 'principled.'"},
{q:"You will discuss AI expectations with students BEFORE they begin",tip:"Students need to know what's expected, what's allowed, and what's not before they start. Retroactive rules create confusion and resentment.",pos:"Clear expectations set. Students understand the purpose of AI in this task.",neg:"Students may misuse AI without realising. Set expectations explicitly."},
{q:"The task includes a reflective component where students evaluate their AI use",tip:"Metacognition is essential. Students should reflect on how AI helped, what it got wrong, what they would do differently, and what they learned from the process.",pos:"Students develop metacognitive awareness about their relationship with AI.",neg:"No reflection means no metacognitive development. Add a brief reflection prompt."}
]},
];
const[taskDesc,setTaskDesc]=useState("");
const[subject,setSubject]=useState("");
const[checked,setChecked]=useState(new Set());
const[showResults,setShowResults]=useState(false);
const allChecks=categories.flatMap((cat,ci)=>cat.checks.map((ch,chi)=>({...ch,catName:cat.name,catColor:cat.color,id:ci+"_"+chi})));
const toggle=(id)=>{const n=new Set(checked);n.has(id)?n.delete(id):n.add(id);setChecked(n);setShowResults(false)};
const total=allChecks.length;
const score=allChecks.filter(c=>checked.has(c.id)).length;
const pct=Math.round(score/total*100);
const band=pct>=88?"Excellent":pct>=69?"Good":pct>=50?"Needs Work":"Redesign Required";
const bandColor=pct>=88?"#2D7D2D":pct>=69?TEAL:pct>=50?AMBER:"#CC3333";
const bandBg=pct>=88?"#E8F4E8":pct>=69?MINT:pct>=50?GOLD:ROSE;
const unchecked=allChecks.filter(c=>!checked.has(c.id));
const checkedItems=allChecks.filter(c=>checked.has(c.id));

return <div style={{maxWidth:950,margin:"0 auto",padding:"32px 20px"}}>
<h1 style={{fontFamily:PF,color:NAVY,fontSize:32,marginBottom:8}}>AI Task Evaluator for Teachers</h1>
<div style={{background:CREAM,border:"2px solid "+AMBER+"40",borderRadius:12,padding:20,marginBottom:24}}>
<h3 style={{fontFamily:DS,color:NAVY,fontSize:15,margin:"0 0 8px"}}>How to use this tool</h3>
<p style={{fontFamily:DS,color:DK,fontSize:13,lineHeight:1.7,margin:"0 0 8px"}}>Before assigning any task where students may use AI, work through this checklist. It evaluates your task across four dimensions: Task Design, AInquiry Alignment, Assessment Integrity, and Learning Design. Each item has a detailed explanation of why it matters.</p>
<p style={{fontFamily:DS,color:DK,fontSize:13,lineHeight:1.7,margin:"0 0 8px"}}><strong>Green checks</strong> = your task meets this criterion. <strong>Unchecked items</strong> = areas to address. After completing the checklist, click <strong>"Generate Report"</strong> for a detailed analysis with specific recommendations.</p>
<p style={{fontFamily:DS,color:"#888",fontSize:12,margin:0}}>Tip: describe your task below so the report is contextualised to your specific activity.</p>
</div>

<div style={{background:"#fff",borderRadius:14,border:"1px solid #e0e0e0",padding:24,marginBottom:20}}>
<label style={{fontFamily:DS,fontWeight:700,color:NAVY,fontSize:14,display:"block",marginBottom:6}}>Describe your task (optional but recommended)</label>
<textarea value={taskDesc} onChange={e=>setTaskDesc(e.target.value)} placeholder="e.g., Year 12 Biology HL students will use AI to help them evaluate the limitations of their IA experimental design..." rows={3} style={{width:"100%",border:"1px solid #ddd",borderRadius:8,padding:12,fontFamily:DS,fontSize:14,resize:"vertical",boxSizing:"border-box",marginBottom:14}}/>
<label style={{fontFamily:DS,fontWeight:700,color:NAVY,fontSize:14,display:"block",marginBottom:6}}>Subject / Year group</label>
<input value={subject} onChange={e=>setSubject(e.target.value)} placeholder="e.g., Biology HL, Year 12" style={{width:"100%",border:"1px solid #ddd",borderRadius:8,padding:10,fontFamily:DS,fontSize:14,boxSizing:"border-box"}}/>
</div>

{categories.map((cat,ci)=><div key={ci} style={{background:"#fff",borderRadius:14,border:"1px solid #e0e0e0",marginBottom:16,overflow:"hidden"}}>
<div style={{background:cat.color,padding:"14px 20px",display:"flex",alignItems:"center",gap:10}}>
<span style={{fontSize:20}}>{cat.icon}</span>
<h3 style={{fontFamily:DS,color:"#fff",margin:0,fontSize:16}}>{cat.name}</h3>
<span style={{marginLeft:"auto",fontFamily:DS,fontSize:12,color:"#ffffffaa"}}>{cat.checks.filter((_,chi)=>checked.has(ci+"_"+chi)).length}/{cat.checks.length}</span>
</div>
<div style={{padding:"8px 20px"}}>
{cat.checks.map((c,chi)=>{const id=ci+"_"+chi;const isChecked=checked.has(id);return <div key={id} style={{padding:"10px 0",borderBottom:chi<cat.checks.length-1?"1px solid #f0f0f0":"none"}}>
<div onClick={()=>toggle(id)} style={{display:"flex",gap:12,cursor:"pointer",alignItems:"center"}}>
<div style={{width:22,height:22,borderRadius:4,border:"2px solid "+cat.color,background:isChecked?cat.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
{isChecked&&<span style={{color:"#fff",fontSize:13,fontWeight:700}}>{"\u2713"}</span>}
</div>
<div style={{fontFamily:DS,fontSize:14,color:DK,fontWeight:600,flex:1}}>{c.q}</div>
<div style={{fontFamily:DS,fontSize:11,color:isChecked?"#2D7D2D":"#999",fontWeight:600,flexShrink:0}}>{isChecked?"\u2713 Met":"Pending"}</div>
</div>
{isChecked&&<div style={{marginLeft:34,marginTop:6,background:"#f8fdf8",borderRadius:6,padding:"8px 12px"}}>
<p style={{fontFamily:DS,fontSize:12,color:"#2D7D2D",margin:0,lineHeight:1.5}}>{c.pos}</p>
</div>}
</div>})}
</div>
</div>)}

<div style={{display:"flex",gap:12,alignItems:"center",marginBottom:20}}>
<div style={{flex:1,background:LIGHT,borderRadius:8,height:14}}>
<div style={{background:bandColor,borderRadius:8,height:14,width:pct+"%",transition:"width 0.4s"}}/>
</div>
<div style={{fontFamily:DS,fontWeight:800,fontSize:24,color:bandColor}}>{pct}%</div>
</div>

<div onClick={()=>setShowResults(true)} style={{background:NAVY,color:"#fff",padding:"14px 32px",borderRadius:10,fontFamily:DS,fontWeight:700,fontSize:15,cursor:"pointer",textAlign:"center",marginBottom:24}}>Generate Report</div>

{showResults&&<div style={{background:"#fff",borderRadius:16,border:"2px solid "+bandColor,overflow:"hidden",marginBottom:24}}>
<div style={{background:bandBg,padding:"24px 28px",borderBottom:"2px solid "+bandColor}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<div>
<h2 style={{fontFamily:PF,color:bandColor,margin:"0 0 4px",fontSize:26}}>{band}</h2>
<p style={{fontFamily:DS,color:DK,margin:0,fontSize:14}}>{subject&&<span><strong>{subject}</strong> \u2014 </span>}{score} of {total} criteria met ({pct}%)</p>
</div>
<div style={{width:70,height:70,borderRadius:"50%",background:bandColor,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:DS,fontWeight:800,fontSize:24}}>{pct}%</div>
</div>
</div>

<div style={{padding:28}}>
{taskDesc&&<div style={{background:LIGHT,borderRadius:10,padding:16,marginBottom:20}}>
<h4 style={{fontFamily:DS,color:NAVY,margin:"0 0 6px",fontSize:13}}>Your Task</h4>
<p style={{fontFamily:DS,color:DK,margin:0,fontSize:14,lineHeight:1.6}}>{taskDesc}</p>
</div>}

<h3 style={{fontFamily:DS,color:NAVY,fontSize:16,margin:"0 0 12px"}}>Overall Assessment</h3>
<p style={{fontFamily:DS,color:DK,fontSize:14,lineHeight:1.7,margin:"0 0 20px"}}>
{pct>=88?"This task is well-designed for responsible AI integration. It protects student thinking, embeds inquiry processes, maintains assessment integrity, and develops genuine learning. You can proceed with confidence. Consider sharing this task design with colleagues as a model.":
pct>=69?"This task has a solid foundation but has gaps that should be addressed before assigning it. Review the areas for improvement below. Most issues can be resolved with minor adjustments to the task instructions or adding a reflective component.":
pct>=50?"This task needs significant revision before it is ready for AI integration. Several critical safeguards are missing, which could lead to students bypassing genuine learning or violating academic integrity. Focus on the priority areas below.":
"This task is not currently suitable for AI integration. The design has fundamental issues that would likely result in students outsourcing their thinking to AI rather than developing it. Consider redesigning from scratch using the AInquiry framework, or making this an AI-free task."}
</p>

{unchecked.length>0&&<div style={{marginBottom:20}}>
<h3 style={{fontFamily:DS,color:"#CC3333",fontSize:16,margin:"0 0 12px"}}>{"\u26A0"} Areas for Improvement ({unchecked.length})</h3>
{unchecked.map((c,i)=><div key={i} style={{background:ROSE,borderRadius:10,padding:16,marginBottom:10,borderLeft:"4px solid #CC3333"}}>
<div style={{fontFamily:DS,fontSize:14,fontWeight:700,color:"#CC3333",marginBottom:4}}>{c.q}</div>
<div style={{fontFamily:DS,fontSize:13,color:DK,lineHeight:1.6,marginBottom:6}}>{c.neg}</div>
<div style={{fontFamily:DS,fontSize:12,color:c.catColor,fontWeight:600}}>Category: {c.catName}</div>
</div>)}
</div>}

{checkedItems.length>0&&<div>
<h3 style={{fontFamily:DS,color:"#2D7D2D",fontSize:16,margin:"0 0 12px"}}>{"\u2713"} Strengths ({checkedItems.length})</h3>
{checkedItems.map((c,i)=><div key={i} style={{background:"#E8F4E8",borderRadius:10,padding:16,marginBottom:10,borderLeft:"4px solid #2D7D2D"}}>
<div style={{fontFamily:DS,fontSize:14,fontWeight:700,color:"#2D7D2D",marginBottom:4}}>{c.q}</div>
<div style={{fontFamily:DS,fontSize:13,color:DK,lineHeight:1.6}}>{c.pos}</div>
</div>)}
</div>}

<div style={{background:CREAM,borderRadius:10,padding:20,marginTop:20,border:"2px solid "+AMBER+"40"}}>
<h3 style={{fontFamily:DS,color:NAVY,fontSize:15,margin:"0 0 8px"}}>Next Steps</h3>
<p style={{fontFamily:DS,color:DK,fontSize:13,lineHeight:1.7,margin:0}}>
{pct>=88?"Share this task design with your department. Consider adding it to the school's AI task library as an example of good practice. Monitor student outputs for any unexpected patterns.":
pct>=69?"Address the flagged areas before assigning the task. Consider piloting with a small group first. After the task, review student Thinking Logs to evaluate the quality of AI interactions.":
pct>=50?"Prioritise the Assessment Integrity and Task Design categories first. Use the AInquiry framework to restructure the task. Discuss with a colleague or coordinator before assigning.":
"Use the AInquiry framework to redesign from scratch. Start by identifying: what is the learning that should happen? Then design the task so that AI supports\u2014but cannot replace\u2014that learning. Consider making this task AI-free instead."}
</p>
</div>
</div>
</div>}
</div>
}

function FAQ(){
const[cat,setCat]=useState("Students");const[open,setOpen]=useState(null);
const items=faqData.find(f=>f.cat===cat)?.items||[];
return <div style={{maxWidth:900,margin:"0 auto",padding:"32px 20px"}}>
<h1 style={{fontFamily:PF,color:NAVY,fontSize:32,marginBottom:20}}>FAQ</h1>
<div style={{display:"flex",gap:8,marginBottom:24}}>
{faqData.map(f=><div key={f.cat} onClick={()=>{setCat(f.cat);setOpen(null)}} style={{background:cat===f.cat?NAVY:"#fff",color:cat===f.cat?"#fff":NAVY,border:"2px solid "+NAVY,borderRadius:10,padding:"8px 20px",cursor:"pointer",fontFamily:DS,fontSize:14,fontWeight:600}}>{f.cat}</div>)}
</div>
{items.map((item,i)=><div key={i} style={{background:"#fff",borderRadius:12,border:open===i?"2px solid "+NAVY:"1px solid #e0e0e0",marginBottom:10}}>
<div onClick={()=>setOpen(open===i?null:i)} style={{padding:"14px 20px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",userSelect:"none"}}>
<span style={{fontFamily:DS,fontWeight:700,color:NAVY,fontSize:14}}>{item.q}</span>
<span style={{fontSize:14,color:"#999",transform:open===i?"rotate(180deg)":"none",transition:"transform 0.2s"}}>\u25BC</span>
</div>
{open===i&&<div style={{padding:"0 20px 16px",borderTop:"1px solid #eee"}}>
<p style={{fontFamily:DS,color:DK,fontSize:13,lineHeight:1.6,marginTop:10}}>{item.a}</p>
</div>}
</div>)}
</div>
}
